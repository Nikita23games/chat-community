<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat System v9</title>
    <style>
        :root { --bg: #e5ddd5; --accent: #075e54; --white: #fff; --gray: #777; }
        body { font-family: 'Segoe UI', sans-serif; background: #dadbd3; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        /* Окно авторизации */
        #auth-container { position: fixed; inset: 0; background: #f0f2f5; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-card { background: var(--white); border-radius: 15px; width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* Табы (Вкладки) */
        .auth-tabs { display: flex; background: #eee; }
        .tab-btn { flex: 1; padding: 15px; border: none; cursor: pointer; font-weight: bold; color: var(--gray); transition: 0.3s; }
        .tab-btn.active { background: var(--white); color: var(--accent); border-bottom: 3px solid var(--accent); }

        .auth-body { padding: 25px; text-align: center; }
        .auth-body input, .auth-body textarea { width: 90%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: inherit; }
        .auth-body button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* Чат */
        #chat-window { width: 100%; max-width: 600px; height: 100vh; background: var(--bg); display: none; flex-direction: column; position: relative; }
        @media (min-width: 600px) { #chat-window { height: 90vh; border-radius: 10px; } }

        header { background: #ededed; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; }
        #messages-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }

        /* Сообщения */
        .message { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; animation: shake 0.2s ease-in-out; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(3px); } 75% { transform: translateX(-3px); } 100% { transform: translateX(0); } }
        .message.mine { align-self: flex-end; flex-direction: row-reverse; }

        .avatar { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; background: #999; overflow: hidden; font-size: 16px; flex-shrink: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .msg-bubble { padding: 8px 12px; border-radius: 10px; background: var(--white); box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .mine .msg-bubble { background: #dcf8c6; }

        /* Модалки */
        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); z-index: 2000; width: 280px; display: none; text-align: center; }
        #input-area { background: #f0f0f0; padding: 10px 15px; display: flex; gap: 10px; }
        #msg-input { flex: 1; padding: 12px; border-radius: 20px; border: none; outline: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-card">
        <div class="auth-tabs">
            <button class="tab-btn active" id="tab-login-btn" onclick="switchTab('login')">Вход</button>
            <button class="tab-btn" id="tab-reg-btn" onclick="switchTab('reg')">Регистрация</button>
        </div>
        
        <div id="form-login" class="auth-body">
            <input type="text" id="login-nick" placeholder="Никнейм">
            <input type="password" id="login-pass" placeholder="Пароль">
            <button onclick="auth('login')">Войти в чат</button>
        </div>

        <div id="form-reg" class="auth-body hidden">
            <div id="reg-avatar-preview" class="avatar" style="width:70px; height:70px; margin: 0 auto 10px; font-size: 30px;">?</div>
            <input type="file" id="reg-file" accept="image/*" style="font-size: 11px;">
            <input type="text" id="reg-nick" placeholder="Придумайте ник">
            <input type="password" id="reg-pass" placeholder="Пароль">
            <textarea id="reg-desc" placeholder="О себе (не обязательно)"></textarea>
            <button onclick="auth('reg')">Создать аккаунт</button>
        </div>
    </div>
</div>

<div id="profile-modal" class="modal">
    <h3>Мой профиль</h3>
    <div id="p-ava" class="avatar" style="width:80px; height:80px; margin:0 auto 10px; font-size:40px;"></div>
    <p id="p-nick" style="font-weight:bold; margin:5px 0;"></p>
    <p id="p-desc" style="font-size:13px; color:gray;"></p>
    <button onclick="closeModal('profile-modal')" style="padding:8px 15px; border-radius:5px; border:1px solid #ccc; cursor:pointer;">Закрыть</button>
</div>

<div id="admin-panel" class="modal">
    <h3 style="color:red;">Админка Nikita</h3>
    <button onclick="clearChat()" style="color:red; width:100%; margin-bottom:10px; padding:10px; cursor:pointer;">Очистить историю</button>
    <button onclick="banPrompt()" style="width:100%; padding:10px; cursor:pointer;">Забанить по нику</button>
    <button onclick="closeModal('admin-panel')" style="margin-top:10px; border:none; background:none; cursor:pointer; color:gray;">Закрыть</button>
</div>

<div id="chat-window">
    <header>
        <div style="display:flex; align-items:center; gap:8px; cursor:pointer;" onclick="openProfile()">
            <div id="header-avatar" class="avatar" style="width:32px; height:32px; font-size:14px;"></div>
            <strong id="header-nick">Чат</strong>
        </div>
        <div>
            <button id="admin-btn" onclick="document.getElementById('admin-panel').style.display='block'" class="hidden" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer; font-weight:bold; margin-right:5px;">ЧИТЫ</button>
            <button onclick="logout()" style="background:none; border:1px solid #ccc; border-radius:5px; cursor:pointer; padding:3px 8px;">Выход</button>
        </div>
    </header>
    <div id="messages-container"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Сообщение..." autocomplete="off">
        <button id="send-btn" style="background:var(--accent); color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;">➤</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, get, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD2sN925y_wx5qn-E6hFRWp77YL56SC2j0",
        authDomain: "chat-community-63b8b.firebaseapp.com",
        databaseURL: "https://chat-community-63b8b-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "chat-community-63b8b",
        storageBucket: "chat-community-63b8b.firebasestorage.app",
        messagingSenderId: "247042160782",
        appId: "1:247042160782:web:0556c9ad0681db3649f1df"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let user = null;
    let tempAvatar = "";

    // Переключение вкладок
    window.switchTab = (type) => {
        document.getElementById('tab-login-btn').classList.toggle('active', type === 'login');
        document.getElementById('tab-reg-btn').classList.toggle('active', type === 'reg');
        document.getElementById('form-login').classList.toggle('hidden', type === 'reg');
        document.getElementById('form-reg').classList.toggle('hidden', type === 'login');
    };

    // Предпросмотр аватарки при регистрации
    document.getElementById('reg-file').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            tempAvatar = ev.target.result;
            document.getElementById('reg-avatar-preview').innerHTML = `<img src="${tempAvatar}">`;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function getAvatarHTML(nick, imgData) {
        if(imgData) return `<img src="${imgData}">`;
        const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3'];
        const color = colors[nick.length % colors.length];
        return `<div style="width:100%; height:100%; background:${color}; display:flex; align-items:center; justify-content:center;">${nick[0].toUpperCase()}</div>`;
    }

    // ЛОГИКА АВТОРИЗАЦИИ
    window.auth = async (type) => {
        const nick = document.getElementById(type + '-nick').value.trim();
        const pass = document.getElementById(type + '-pass').value.trim();
        if(!nick || !pass) return alert("Заполни поля!");

        const userRef = ref(db, 'users/' + nick);
        const snap = await get(userRef);

        if(type === 'login') {
            if(snap.exists() && snap.val().pass === pass) login(snap.val());
            else alert("Ошибка: пользователь не найден или пароль неверный!");
        } else {
            if(snap.exists()) return alert("Этот ник уже занят!");
            const newUser = { nick, pass, avatar: tempAvatar, desc: document.getElementById('reg-desc').value || "Привет!" };
            await set(userRef, newUser);
            login(newUser);
        }
    };

    function login(data) {
        user = data;
        localStorage.setItem('chat_v9_user', JSON.stringify(user));
        startChat();
    }

    function startChat() {
        document.getElementById('auth-container').classList.add('hidden');
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('header-nick').textContent = user.nick;
        document.getElementById('header-avatar').innerHTML = getAvatarHTML(user.nick, user.avatar);

        if(user.nick === "Nikita" && user.pass === "nikitakit") document.getElementById('admin-btn').classList.remove('hidden');

        onValue(ref(db, 'banned/' + user.nick), (s) => { if(s.exists()) { alert("БАН!"); logout(); }});
        onChildAdded(ref(db, 'messages'), (s) => renderMessage(s.val()));
    }

    function renderMessage(data) {
        const isMine = data.nick === user.nick;
        const div = document.createElement('div');
        div.className = `message ${isMine ? 'mine' : ''}`;
        div.innerHTML = `
            <div class="avatar">${getAvatarHTML(data.nick, data.avatar)}</div>
            <div class="msg-bubble">
                <small style="font-weight:bold; color:var(--accent); font-size:10px; display:block;">${data.nick}</small>
                ${data.text}
            </div>
        `;
        document.getElementById('messages-container').appendChild(div);
        document.getElementById('messages-container').scrollTop = 999999;
    }

    // Взаимодействие
    window.openProfile = () => {
        document.getElementById('p-ava').innerHTML = getAvatarHTML(user.nick, user.avatar);
        document.getElementById('p-nick').textContent = user.nick;
        document.getElementById('p-desc').textContent = user.desc;
        document.getElementById('profile-modal').style.display = 'block';
    };

    window.clearChat = () => { if(confirm("Стереть всё?")) remove(ref(db, 'messages')); };
    window.banPrompt = () => { const n = prompt("Ник:"); if(n) set(ref(db, 'banned/' + n), true); };
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';

    function send() {
        const t = document.getElementById('msg-input').value.trim();
        if(t) {
            push(ref(db, 'messages'), { nick: user.nick, avatar: user.avatar, text: t });
            document.getElementById('msg-input').value = '';
        }
    }

    document.getElementById('send-btn').onclick = send;
    document.getElementById('msg-input').onkeydown = (e) => e.key === 'Enter' && send();
    window.logout = () => { localStorage.removeItem('chat_v9_user'); location.reload(); };

    const saved = localStorage.getItem('chat_v9_user');
    if(saved) { user = JSON.parse(saved); startChat(); }
</script>

</body>
</html>
