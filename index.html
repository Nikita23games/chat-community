<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nikita Final Chat v29</title>
    <style>
        :root { --bg: #e5ddd5; --accent: #075e54; --white: #fff; --red: #d32f2f; --gold: #ffc107; --gray: #f0f0f0; }
        body, html { font-family: 'Segoe UI', sans-serif; background: #111; margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }

        #chat-window { width: 100%; max-width: 450px; background: var(--bg); display: none; flex-direction: column; height: 100%; margin: 0 auto; position: relative; }
        header { background: #ededed; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; flex-shrink: 0; }
        
        #messages-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }

        #input-area { background: #f0f0f0; padding: 10px 15px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); display: flex; gap: 8px; border-top: 1px solid #ddd; align-items: center; flex-shrink: 0; }
        #msg-input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ccc; outline: none; font-size: 16px; background: white; resize: none; max-height: 80px; }
        
        .avatar { width: 38px; height: 38px; border-radius: 50%; background: #555; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        /* ЭФФЕКТ ТРЯСКИ ПРИ ОТПРАВКЕ */
        .message { display: flex; gap: 8px; max-width: 85%; animation: cardShake 0.4s both; }
        @keyframes cardShake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 40%, 60% { transform: translate3d(2px, 0, 0); } }
        .message.mine { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 8px 12px; border-radius: 15px; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
        .mine .msg-bubble { background: #dcf8c6; }
        
        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; cursor: pointer; }
        .bot-bubble { background: #fff9c4 !important; border: 1px solid var(--gold); }
        .hidden { display: none !important; }

        /* ПРОФИЛЬ */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 4000; padding: 20px; }
        .modal-card { background: white; border-radius: 25px; width: 100%; max-width: 320px; padding: 25px; text-align: center; }
        .profile-ava-big { width: 100px; height: 100px; border-radius: 50%; background: var(--gray); margin: 0 auto 15px; border: 4px solid var(--accent); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .profile-ava-big img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div id="auth-container" style="position:fixed; inset:0; background:#f0f2f5; display:flex; justify-content:center; align-items:center; z-index:5000;">
    <div style="background:white; padding:30px; border-radius:25px; width:280px; text-align:center;">
        <h2 style="color:var(--accent)">Nikita Chat v29</h2>
        <input type="text" id="login-nick" placeholder="Никнейм" style="width:100%; padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:10px;">
        <input type="password" id="login-pass" placeholder="Пароль" style="width:100%; padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:10px;">
        <button id="btn-enter" style="width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:bold;">ВОЙТИ</button>
    </div>
</div>

<div id="profile-modal" class="modal">
    <div class="modal-card">
        <div class="profile-ava-big" id="p-ava-view" onclick="document.getElementById('p-file').click()">?</div>
        <input type="file" id="p-file" class="hidden" accept="image/*">
        <h3 id="p-nick-view">...</h3>
        <p id="p-coins-view" style="color:var(--gold); font-weight:bold; font-size:20px;">0 💰</p>
        <button onclick="closeModal('profile-modal')" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:bold;">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="chat-window">
    <header>
        <div style="display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="openProfile()">
            <div id="my-ava" class="avatar"></div>
            <strong><span id="my-name">...</span></strong>
        </div>
        <small id="my-coins-header" style="color:var(--gold); font-weight:bold;">💰 0</small>
    </header>
    
    <div id="messages-container"></div>

    <div id="input-area">
        <label style="cursor:pointer; font-size:24px;">🖼️<input type="file" id="chat-file-input" class="hidden" accept="image/*"></label>
        <textarea id="msg-input" placeholder="Сообщение или 'фарм'..." rows="1"></textarea>
        <button id="send-btn" style="background:var(--accent); color:white; border:none; width:40px; height:40px; border-radius:50%;">➤</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, get, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD2sN925y_wx5qn-E6hFRWp77YL56SC2j0",
        authDomain: "chat-community-63b8b.firebaseapp.com",
        databaseURL: "https://chat-community-63b8b-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "chat-community-63b8b",
        storageBucket: "chat-community-63b8b.firebasestorage.app",
        messagingSenderId: "247042160782",
        appId: "1:247042160782:web:0556c9ad0681db3649f1df"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let user = null;
    let userAvatars = {};

    if ("Notification" in window) Notification.requestPermission();

    function sendNotify(title, text) {
        if (document.hidden && Notification.permission === "granted") {
            new Notification(title, { body: text, icon: "https://cdn-icons-png.flaticon.com/512/272/272525.png" });
        }
    }

    onValue(ref(db, 'users'), (snap) => {
        if(snap.exists()){
            const data = snap.val();
            for(let n in data) {
                userAvatars[n] = data[n].avatar || "";
                if(user && n === user.nick) {
                    user.coins = data[n].coins || 0;
                    user.lastFarm = data[n].lastFarm || 0;
                    document.getElementById('my-coins-header').textContent = `💰 ${user.coins}`;
                }
            }
        }
    });

    document.getElementById('btn-enter').onclick = async () => {
        const nick = document.getElementById('login-nick').value.trim();
        const pass = document.getElementById('login-pass').value.trim();
        if(!nick || !pass) return;
        const snap = await get(ref(db, 'users/' + nick));
        user = snap.exists() ? snap.val() : { nick, pass, avatar: "", coins: 0, lastFarm: 0 };
        await set(ref(db, 'users/' + nick), user);
        localStorage.setItem('chat_v29', JSON.stringify(user));
        location.reload();
    };

    function startChat() {
        document.getElementById('auth-container').classList.add('hidden');
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('my-name').textContent = user.nick;
        document.getElementById('my-ava').innerHTML = user.avatar ? `<img src="${user.avatar}">` : user.nick[0].toUpperCase();

        onChildAdded(ref(db, 'messages'), (s) => {
            const data = s.val();
            renderMessage(data);
            if (data.nick !== user.nick && data.nick !== 'BANKER') {
                const text = data.type === 'image' ? "📸 Картинка" : data.content;
                sendNotify(`От ${data.nick}`, text);
            }
        });
    }

    // ОТПРАВКА КАРТИНКИ
    document.getElementById('chat-file-input').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            await push(ref(db, 'messages'), { 
                nick: user.nick, 
                type: 'image', 
                content: ev.target.result 
            });
        };
        reader.readAsDataURL(file);
    };

    // ОТПРАВКА ТЕКСТА И ФАРМ
    document.getElementById('send-btn').onclick = async () => {
        const val = document.getElementById('msg-input').value.trim();
        if(!val) return;

        await push(ref(db, 'messages'), { nick: user.nick, type: 'text', content: val });

        if(val.toLowerCase() === 'фарм') {
            const now = Date.now();
            const wait = 30 * 60 * 1000;
            const diff = now - (user.lastFarm || 0);

            if(diff >= wait) {
                let newCoins = (user.coins || 0) + 20;
                await set(ref(db, `users/${user.nick}/coins`), newCoins);
                await set(ref(db, `users/${user.nick}/lastFarm`), now);
                await push(ref(db, 'messages'), { nick: 'BANKER', type: 'bot', content: `✅ ${user.nick}, +20 монет!` });
            } else {
                const min = Math.ceil((wait - diff) / 60000);
                await push(ref(db, 'messages'), { nick: 'BANKER', type: 'bot', content: `⏳ Жди ${min} мин.` });
            }
        }
        document.getElementById('msg-input').value = "";
    };

    function renderMessage(d) {
        const container = document.getElementById('messages-container');
        const div = document.createElement('div');
        const isBot = d.nick === 'BANKER';
        div.className = `message ${d.nick === user.nick ? 'mine' : ''}`;
        
        const ava = isBot ? "https://cdn-icons-png.flaticon.com/512/272/272525.png" : userAvatars[d.nick];
        const content = d.type === 'image' ? `<img src="${d.content}" class="chat-img" onclick="window.open('${d.content}')">` : d.content;
        
        div.innerHTML = `
            <div class="avatar">${ava ? `<img src="${ava}">` : (d.nick ? d.nick[0].toUpperCase() : "?")}</div>
            <div class="msg-bubble ${isBot ? 'bot-bubble' : ''}">
                <small style="display:block; font-size:10px; opacity:0.6;">${d.nick}</small>
                ${content}
            </div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    window.openProfile = () => {
        document.getElementById('p-nick-view').textContent = user.nick;
        document.getElementById('p-coins-view').textContent = `${user.coins || 0} 💰`;
        document.getElementById('p-ava-view').innerHTML = user.avatar ? `<img src="${user.avatar}">` : user.nick[0].toUpperCase();
        document.getElementById('profile-modal').style.display = 'flex';
    };

    window.closeModal = (id) => document.getElementById(id).style.display = 'none';

    // СМЕНА АВЫ В ПРОФИЛЕ
    document.getElementById('p-file').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = async (ev) => {
            user.avatar = ev.target.result;
            await set(ref(db, `users/${user.nick}/avatar`), user.avatar);
            document.getElementById('p-ava-view').innerHTML = `<img src="${user.avatar}">`;
            document.getElementById('my-ava').innerHTML = `<img src="${user.avatar}">`;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    const saved = localStorage.getItem('chat_v29');
    if(saved) { user = JSON.parse(saved); startChat(); }
</script>
</body>
</html>
