<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nikita Notify Chat v27</title>
    <style>
        :root { --bg: #e5ddd5; --accent: #075e54; --white: #fff; --red: #d32f2f; --gold: #ffc107; --gray: #f0f0f0; }
        body, html { font-family: 'Segoe UI', sans-serif; background: #111; margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #chat-window { width: 100%; max-width: 450px; background: var(--bg); display: none; flex-direction: column; height: 100%; margin: 0 auto; position: relative; }
        header { background: #ededed; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; flex-shrink: 0; }
        #messages-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        #input-area { background: #f0f0f0; padding: 10px 15px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); display: flex; gap: 8px; border-top: 1px solid #ddd; align-items: center; flex-shrink: 0; }
        #msg-input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ccc; outline: none; font-size: 16px; background: white; resize: none; max-height: 80px; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; background: #555; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .message { display: flex; gap: 8px; max-width: 85%; animation: cardShake 0.4s both; }
        @keyframes cardShake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 40%, 60% { transform: translate3d(2px, 0, 0); } }
        .message.mine { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 8px 12px; border-radius: 15px; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .mine .msg-bubble { background: #dcf8c6; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-container" style="position:fixed; inset:0; background:#f0f2f5; display:flex; justify-content:center; align-items:center; z-index:5000;">
    <div style="background:white; padding:30px; border-radius:25px; width:280px; text-align:center;">
        <h2 style="color:var(--accent)">Nikita v27</h2>
        <input type="text" id="login-nick" placeholder="Никнейм" style="width:100%; padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:10px;">
        <input type="password" id="login-pass" placeholder="Пароль" style="width:100%; padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:10px;">
        <button id="btn-enter" style="width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:bold;">ВОЙТИ</button>
    </div>
</div>

<div id="chat-window">
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <div id="my-ava" class="avatar"></div>
            <strong><span id="my-name">...</span></strong>
        </div>
        <small id="my-coins-header" style="color:var(--gold); font-weight:bold;">💰 0</small>
    </header>
    <div id="messages-container"></div>
    <div id="input-area">
        <textarea id="msg-input" placeholder="Сообщение..."></textarea>
        <button id="send-btn" style="background:var(--accent); color:white; border:none; width:40px; height:40px; border-radius:50%;">➤</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, get, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD2sN925y_wx5qn-E6hFRWp77YL56SC2j0",
        authDomain: "chat-community-63b8b.firebaseapp.com",
        databaseURL: "https://chat-community-63b8b-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "chat-community-63b8b",
        storageBucket: "chat-community-63b8b.firebasestorage.app",
        messagingSenderId: "247042160782",
        appId: "1:247042160782:web:0556c9ad0681db3649f1df"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let user = null;
    let userAvatars = {};

    // 1. ЗАПРОС НА УВЕДОМЛЕНИЯ
    if ("Notification" in window) {
        Notification.requestPermission();
    }

    // 2. ФУНКЦИЯ ОТПРАВКИ УВЕДОМЛЕНИЯ
    function sendNotification(title, text) {
        // Проверяем: если вкладка НЕ в фокусе и разрешение дано
        if (document.hidden && Notification.permission === "granted") {
            new Notification(title, {
                body: text,
                icon: "https://cdn-icons-png.flaticon.com/512/733/733585.png" 
            });
        }
    }

    onValue(ref(db, 'users'), (snap) => {
        if(snap.exists()){
            const data = snap.val();
            for(let n in data) {
                userAvatars[n] = data[n].avatar || "";
                if(user && n === user.nick) {
                    user.coins = data[n].coins || 0;
                    document.getElementById('my-coins-header').textContent = `💰 ${user.coins}`;
                }
            }
        }
    });

    document.getElementById('btn-enter').onclick = async () => {
        const nick = document.getElementById('login-nick').value.trim();
        const pass = document.getElementById('login-pass').value.trim();
        if(!nick || !pass) return;
        const snap = await get(ref(db, 'users/' + nick));
        user = snap.exists() ? snap.val() : { nick, pass, avatar: "", coins: 0 };
        await set(ref(db, 'users/' + nick), user);
        localStorage.setItem('chat_v27', JSON.stringify(user));
        location.reload();
    };

    function startChat() {
        document.getElementById('auth-container').classList.add('hidden');
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('my-name').textContent = user.nick;
        document.getElementById('my-ava').innerHTML = user.avatar ? `<img src="${user.avatar}">` : user.nick[0].toUpperCase();

        onChildAdded(ref(db, 'messages'), (s) => {
            const data = s.val();
            renderMessage(data);
            
            // 3. ЛОГИКА УВЕДОМЛЕНИЯ
            // Если сообщение не от меня и я не в сети (вкладка скрыта)
            if (data.nick !== user.nick && data.nick !== 'BANKER') {
                const msgText = data.type === 'image' ? "📸 Изображение" : data.content;
                sendNotification(`Новое от ${data.nick}`, msgText);
            }
        });
    }

    function renderMessage(d) {
        const container = document.getElementById('messages-container');
        const div = document.createElement('div');
        div.className = `message ${d.nick === user.nick ? 'mine' : ''}`;
        const content = d.type === 'image' ? `<img src="${d.content}" style="width:100%; border-radius:10px;">` : d.content;
        const ava = d.nick === 'BANKER' ? 'https://cdn-icons-png.flaticon.com/512/272/272525.png' : userAvatars[d.nick];
        
        div.innerHTML = `
            <div class="avatar">${ava ? `<img src="${ava}">` : (d.nick ? d.nick[0].toUpperCase() : "?")}</div>
            <div class="msg-bubble">${content}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    document.getElementById('send-btn').onclick = async () => {
        const val = document.getElementById('msg-input').value.trim();
        if(!val) return;
        await push(ref(db, 'messages'), { nick: user.nick, type: 'text', content: val });
        document.getElementById('msg-input').value = "";
    };

    const saved = localStorage.getItem('chat_v27');
    if(saved) { user = JSON.parse(saved); startChat(); }
</script>
</body>
</html>
