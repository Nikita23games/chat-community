<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Chat System</title>
    <style>
        :root { --bg: #e5ddd5; --accent: #075e54; --white: #fff; --admin-color: #ff3b3b; }
        body { font-family: 'Segoe UI', sans-serif; background: #dadbd3; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Авторизация */
        #auth-container { position: fixed; inset: 0; background: #f0f2f5; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-card { background: var(--white); padding: 30px; border-radius: 12px; width: 340px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .auth-card input { width: 90%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .auth-card button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Чат */
        #chat-window { width: 600px; height: 90vh; background: var(--bg); display: none; flex-direction: column; border-radius: 10px; overflow: hidden; position: relative; }
        header { background: #ededed; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; }
        #messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .message { display: flex; gap: 10px; max-width: 80%; }
        .message.mine { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; cursor: pointer; }
        .msg-bubble { padding: 8px 12px; border-radius: 10px; background: var(--white); box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .mine .msg-bubble { background: #dcf8c6; }

        /* Читы / Админка */
        #admin-btn { display: none; background: var(--admin-color); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #admin-panel { position: absolute; top: 60px; right: 20px; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 500; display: none; width: 200px; }
        .admin-panel button { width: 100%; margin-bottom: 5px; cursor: pointer; padding: 8px; border: 1px solid #ddd; border-radius: 5px; background: #f9f9f9; }
        .admin-panel button:hover { background: #eee; }

        #input-area { background: #f0f0f0; padding: 15px; display: flex; gap: 10px; }
        #input-area input { flex: 1; padding: 12px; border-radius: 20px; border: none; outline: none; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-container">
    <div id="login-box" class="auth-card">
        <h2>Вход в систему</h2>
        <input type="text" id="login-nick" placeholder="Никнейм">
        <input type="password" id="login-pass" placeholder="Пароль">
        <button id="do-login">Войти</button>
        <p style="font-size: 12px; color: #666;">(Для регистрации просто введите новые данные)</p>
    </div>
</div>

<div id="chat-window">
    <header>
        <strong id="my-name">Чат</strong>
        <div>
            <button id="admin-btn" onclick="document.getElementById('admin-panel').style.display = 'block'">★ ЧИТЫ</button>
            <button onclick="logout()">Выйти</button>
        </div>
    </header>

    <div id="admin-panel">
        <h4 style="margin:0 0 10px 0; color:red;">Панель Nikita</h4>
        <button onclick="clearHistory()">Очистить историю</button>
        <button onclick="banPrompt()">Забанить по нику</button>
        <button onclick="document.getElementById('admin-panel').style.display='none'">Закрыть</button>
    </div>

    <div id="messages-container"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Сообщение...">
        <button id="send-btn" style="background:var(--accent); color:white; border:none; width:40px; height:40px; border-radius:50%; cursor:pointer;">➤</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, get, child, remove, onValue, set } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD2sN925y_wx5qn-E6hFRWp77YL56SC2j0",
        authDomain: "chat-community-63b8b.firebaseapp.com",
        databaseURL: "https://chat-community-63b8b-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "chat-community-63b8b",
        storageBucket: "chat-community-63b8b.firebasestorage.app",
        messagingSenderId: "247042160782",
        appId: "1:247042160782:web:0556c9ad0681db3649f1df"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let user = null;

    // --- АВТОРИЗАЦИЯ И РЕГИСТРАЦИЯ ---
    document.getElementById('do-login').onclick = async () => {
        const nick = document.getElementById('login-nick').value.trim();
        const pass = document.getElementById('login-pass').value.trim();
        
        const userRef = ref(db, 'users/' + nick);
        const snapshot = await get(userRef);

        if (snapshot.exists()) {
            const data = Object.values(snapshot.val())[0];
            if (data.pass === pass) {
                loginSuccess(data);
            } else {
                alert("Неверный пароль!");
            }
        } else {
            // Если пользователя нет — регистрируем
            const newData = { nick, pass, avatar: "https://via.placeholder.com/35" };
            await push(userRef, newData);
            loginSuccess(newData);
        }
    };

    function loginSuccess(userData) {
        user = userData;
        localStorage.setItem('chat_session', JSON.stringify(user));
        startChat();
    }

    function startChat() {
        document.getElementById('auth-container').classList.add('hidden');
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('my-name').textContent = user.nick;

        // Проверка на админа (ТВОЙ АККАУНТ)
        if (user.nick === "Nikita" && user.pass === "nikitakit") {
            document.getElementById('admin-btn').style.display = "inline-block";
        }

        // ПРОВЕРКА НА БАН (СЛУШАТЕЛЬ)
        onValue(ref(db, 'banned/' + user.nick), (snapshot) => {
            if (snapshot.exists()) {
                alert("ВАС ЗАБАНИЛИ!");
                logout();
            }
        });

        // Загрузка сообщений
        onChildAdded(ref(db, 'messages'), (snap) => {
            renderMessage(snap.val(), snap.key);
        });
    }

    function renderMessage(data, key) {
        const isMine = data.nick === user.nick;
        const div = document.createElement('div');
        div.className = `message ${isMine ? 'mine' : 'others'}`;
        div.innerHTML = `
            <img src="${data.avatar}" class="msg-avatar">
            <div class="msg-bubble">
                <small style="font-weight:bold; font-size:10px; color:var(--accent)">${data.nick}</small>
                <div>${data.text}</div>
            </div>
        `;
        document.getElementById('messages-container').appendChild(div);
        document.getElementById('messages-container').scrollTop = 999999;
    }

    // --- ФУНКЦИИ ЧИТОВ (Никита) ---
    window.clearHistory = () => {
        if(confirm("Удалить ВСЕ сообщения в базе?")) {
            remove(ref(db, 'messages'));
            location.reload();
        }
    };

    window.banPrompt = async () => {
        const target = prompt("Введите ник для БАНА:");
        if(target) {
            // Добавляем в список забаненных
            await set(ref(db, 'banned/' + target), true);
            alert(`Пользователь ${target} забанен и будет выкинут.`);
        }
    };

    // --- БАЗОВЫЕ ФУНКЦИИ ---
    document.getElementById('send-btn').onclick = () => {
        const text = document.getElementById('msg-input').value.trim();
        if(text) {
            push(ref(db, 'messages'), { nick: user.nick, avatar: user.avatar, text });
            document.getElementById('msg-input').value = '';
        }
    };

    window.logout = () => {
        localStorage.removeItem('chat_session');
        location.reload();
    };

    const saved = localStorage.getItem('chat_session');
    if(saved) { user = JSON.parse(saved); startChat(); }
</script>

</body>
</html>
