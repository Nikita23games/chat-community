<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nikita Admin Control v21</title>
    <style>
        :root { --bg: #e5ddd5; --accent: #075e54; --white: #fff; --red: #d32f2f; --gray: #888; }
        body, html { font-family: 'Segoe UI', sans-serif; background: #111; margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }

        #chat-window { width: 100%; max-width: 450px; background: var(--bg); display: none; flex-direction: column; height: 100%; margin: 0 auto; position: relative; }
        header { background: #ededed; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; flex-shrink: 0; }
        
        #messages-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        #input-area { background: #f0f0f0; padding: 10px 15px; padding-bottom: calc(45px + env(safe-area-inset-bottom)); display: flex; gap: 10px; border-top: 1px solid #ddd; align-items: flex-end; flex-shrink: 0; }
        #msg-input { flex: 1; padding: 12px 18px; border-radius: 20px; border: 1px solid #ccc; outline: none; font-size: 16px; background: white; resize: none; max-height: 100px; font-family: inherit; }
        #send-btn { background: var(--accent); color: white; border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* ЭКРАН БАНА */
        #ban-overlay { position: fixed; inset: 0; background: #fff; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; text-align: center; padding: 30px; }
        .ban-icon { font-size: 80px; color: var(--red); margin-bottom: 20px; }

        /* ЭФФЕКТ ТРЯСКИ КАРТЫ */
        .message { display: flex; gap: 8px; max-width: 85%; animation: shake 0.3s ease; }
        @keyframes shake { 
            0% { transform: translateX(8px); } 
            25% { transform: translateX(-5px); } 
            50% { transform: translateX(3px); } 
            100% { transform: translateX(0); } 
        }

        .msg-system { align-self: center; background: rgba(0,0,0,0.05); color: #555; padding: 5px 15px; border-radius: 10px; font-size: 13px; font-style: italic; margin: 5px 0; text-align: center; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; background: #555; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; flex-shrink: 0; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .message.mine { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 10px 14px; border-radius: 15px; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; }
        .mine .msg-bubble { background: #dcf8c6; }

        /* МОДАЛКИ */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-card { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; }
        .admin-opt { background: var(--red); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        .list-box { margin-bottom: 15px; text-align: left; max-height: 200px; overflow-y: auto; border: 1px solid #eee; border-radius: 10px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f9f9f9; }

        #auth-container { position: fixed; inset: 0; background: #f0f2f5; display: flex; justify-content: center; align-items: center; z-index: 3000; }
        .auth-card { background: var(--white); border-radius: 20px; width: 85%; max-width: 320px; padding: 25px; text-align: center; }
        .hidden { display: none !important; }
        #admin-btn { background: var(--red); color: white; border: none; padding: 6px 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="ban-overlay">
    <div class="ban-icon">🚫</div>
    <h1 style="color:var(--red)">ДОСТУП ЗАКРЫТ</h1>
    <p>Ваш аккаунт был заблокирован администратором.</p>
    <button onclick="confirmBan()" style="padding:15px 40px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:bold; margin-top:20px; cursor:pointer;">ОК</button>
</div>

<div id="auth-container">
    <div class="auth-card">
        <h2 style="color:var(--accent)">Nikita Chat v21</h2>
        <input type="text" id="login-nick" placeholder="Никнейм" style="width:100%; padding:12px; margin:5px 0; border:1px solid #ddd; border-radius:10px;">
        <input type="password" id="login-pass" placeholder="Пароль" style="width:100%; padding:12px; margin:5px 0; border:1px solid #ddd; border-radius:10px;">
        <button id="btn-enter" style="width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:10px; margin-top:10px; font-weight:bold;">ВОЙТИ</button>
    </div>
</div>

<div id="profile-modal" class="modal">
    <div class="modal-card">
        <h3>Мой Профиль</h3>
        <div id="edit-ava-preview" style="width:80px;height:80px;border-radius:50%;background:#eee;margin:0 auto 10px;overflow:hidden;border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="document.getElementById('file-input').click()">?</div>
        <input type="file" id="file-input" class="hidden" accept="image/*">
        <textarea id="edit-desc" placeholder="Статус..." style="width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;margin-bottom:10px;"></textarea>
        <button class="admin-opt" style="background:var(--accent)" onclick="saveProfile()">СОХРАНИТЬ</button>
        <button onclick="closeModal('profile-modal')" style="border:none;background:none;color:gray;">Закрыть</button>
    </div>
</div>

<div id="admin-modal" class="modal">
    <div class="modal-card" id="admin-main">
        <h3 style="color:var(--red)">Админ-центр</h3>
        <button class="admin-opt" onclick="openBanList()">🚫 Забанить</button>
        <button class="admin-opt" style="background:#333" onclick="openBlackList()">🖤 Черный список</button>
        <button class="admin-opt" style="background:var(--gray)" onclick="clearMessages()">🗑 Очистить чат</button>
        <button onclick="closeModal('admin-modal')" style="border:none;background:none;color:gray;">Закрыть</button>
    </div>
    <div class="modal-card hidden" id="admin-ban-select">
        <h3>Кого забанить?</h3>
        <div id="potential-ban-list" class="list-box"></div>
        <button class="admin-opt" onclick="applyBan()">ПОДТВЕРДИТЬ БАН</button>
        <button onclick="backToAdmin()" style="border:none;background:none;color:gray;">Назад</button>
    </div>
    <div class="modal-card hidden" id="admin-black-list">
        <h3>Черный список</h3>
        <div id="banned-users-container" class="list-box"></div>
        <button onclick="backToAdmin()" style="border:none;background:none;color:gray;">Назад</button>
    </div>
</div>

<div id="chat-window">
    <header>
        <div style="display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="openProfile()">
            <div id="my-ava" class="avatar"></div>
            <strong id="my-name">...</strong>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <button id="admin-btn" class="hidden" onclick="openAdmin()">ЧИТЫ</button>
            <button onclick="localStorage.clear(); location.reload();" style="border:none; background:none; font-weight:bold; color:var(--accent);">Выход</button>
        </div>
    </header>
    <div id="messages-container"></div>
    <div id="input-area">
        <textarea id="msg-input" placeholder="Сообщение..." rows="1"></textarea>
        <button id="send-btn">➤</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, get, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD2sN925y_wx5qn-E6hFRWp77YL56SC2j0",
        authDomain: "chat-community-63b8b.firebaseapp.com",
        databaseURL: "https://chat-community-63b8b-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "chat-community-63b8b",
        storageBucket: "chat-community-63b8b.firebasestorage.app",
        messagingSenderId: "247042160782",
        appId: "1:247042160782:web:0556c9ad0681db3649f1df"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let user = null;
    let chatMembers = new Set();
    let currentlyBanned = [];

    // ГЛОБАЛЬНАЯ КНОПКА ОК ДЛЯ БАНА
    window.confirmBan = () => {
        localStorage.clear();
        location.reload();
    };

    // ПРОВЕРКА БАНА В РЕАЛЬНОМ ВРЕМЕНИ
    onValue(ref(db, 'banned'), (s) => {
        currentlyBanned = s.exists() ? Object.keys(s.val()) : [];
        if(user && currentlyBanned.includes(user.nick)) {
            document.getElementById('ban-overlay').style.display = 'flex';
            document.getElementById('chat-window').style.display = 'none';
        }
    });

    document.getElementById('btn-enter').onclick = async () => {
        const nick = document.getElementById('login-nick').value.trim();
        const pass = document.getElementById('login-pass').value.trim();
        if(!nick || !pass) return;

        const banSnap = await get(ref(db, 'banned/' + nick));
        if(banSnap.exists()) {
            document.getElementById('ban-overlay').style.display = 'flex';
            return;
        }

        const snap = await get(ref(db, 'users/' + nick));
        if(snap.exists() && snap.val().pass !== pass) return alert("Пароль неверный!");
        
        user = snap.exists() ? snap.val() : { nick, pass, avatar: "", desc: "" };
        if(nick === "Nikita" && pass === "nikitakit") user.isAdmin = true;
        
        await set(ref(db, 'users/' + nick), user);
        localStorage.setItem('chat_v21_nikita', JSON.stringify(user));
        startChat();
    };

    function startChat() {
        document.getElementById('auth-container').classList.add('hidden');
        document.getElementById('chat-window').style.display = 'flex';
        updateHeader();
        if(user.isAdmin) document.getElementById('admin-btn').classList.remove('hidden');

        onChildAdded(ref(db, 'messages'), (s) => {
            renderMessage(s.val());
            if(s.val().nick && s.val().nick !== user.nick) chatMembers.add(s.val().nick);
        });
    }

    function updateHeader() {
        document.getElementById('my-name').textContent = user.nick;
        document.getElementById('my-ava').innerHTML = user.avatar ? `<img src="${user.avatar}">` : user.nick[0].toUpperCase();
    }

    // ПРОФИЛЬ
    window.openProfile = () => {
        document.getElementById('edit-ava-preview').innerHTML = user.avatar ? `<img src="${user.avatar}">` : user.nick[0].toUpperCase();
        document.getElementById('edit-desc').value = user.desc || "";
        document.getElementById('profile-modal').style.display = 'flex';
    };
    document.getElementById('file-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => { user.avatar = ev.target.result; document.getElementById('edit-ava-preview').innerHTML = `<img src="${user.avatar}">`; };
        reader.readAsDataURL(e.target.files[0]);
    };
    window.saveProfile = async () => {
        user.desc = document.getElementById('edit-desc').value;
        await set(ref(db, 'users/' + user.nick), user);
        localStorage.setItem('chat_v21_nikita', JSON.stringify(user));
        updateHeader(); closeModal('profile-modal');
    };

    // АДМИНКА
    window.openAdmin = () => document.getElementById('admin-modal').style.display = 'flex';
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.backToAdmin = () => {
        document.getElementById('admin-main').classList.remove('hidden');
        document.getElementById('admin-ban-select').classList.add('hidden');
        document.getElementById('admin-black-list').classList.add('hidden');
    };

    window.openBanList = () => {
        const list = document.getElementById('potential-ban-list'); list.innerHTML = "";
        chatMembers.forEach(n => { if(n !== "Nikita" && !currentlyBanned.includes(n)) list.innerHTML += `<div class="list-item">${n} <input type="checkbox" value="${n}" class="ban-cb"></div>`; });
        document.getElementById('admin-main').classList.add('hidden');
        document.getElementById('admin-ban-select').classList.remove('hidden');
    };

    window.openBlackList = () => {
        const list = document.getElementById('banned-users-container'); list.innerHTML = "";
        currentlyBanned.forEach(n => { list.innerHTML += `<div class="list-item">${n} <button onclick="unbanUser('${n}')" style="background:var(--accent);color:white;border:none;border-radius:5px;padding:5px 10px;">Разбан</button></div>`; });
        document.getElementById('admin-main').classList.add('hidden');
        document.getElementById('admin-black-list').classList.remove('hidden');
    };

    window.applyBan = async () => {
        const cbs = document.querySelectorAll('.ban-cb:checked');
        for(let cb of cbs) {
            await push(ref(db, 'messages'), { type: 'system', text: `Пользователь ${cb.value} был забанен` });
            await set(ref(db, 'banned/' + cb.value), true);
        }
        backToAdmin();
    };

    window.unbanUser = async (nick) => {
        await remove(ref(db, 'banned/' + nick));
        await push(ref(db, 'messages'), { type: 'system', text: `Пользователь ${nick} был разблокирован` });
        openBlackList();
    };

    window.clearMessages = async () => { if(confirm("Очистить?")) { await remove(ref(db, 'messages')); location.reload(); }};

    function renderMessage(d) {
        const container = document.getElementById('messages-container');
        const div = document.createElement('div');
        if(d.type === 'system') {
            div.className = 'msg-system';
            div.textContent = d.text;
        } else {
            const isMine = d.nick === user.nick;
            div.className = `message ${isMine ? 'mine' : ''}`;
            div.innerHTML = `<div class="avatar">${d.avatar ? `<img src="${d.avatar}">` : d.nick[0]}</div><div class="msg-bubble"><small style="display:block;font-size:10px;color:var(--accent);font-weight:bold;">${d.nick}</small>${d.text.replace(/\n/g, '<br>')}</div>`;
        }
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    const msgInput = document.getElementById('msg-input');
    function send() {
        if(msgInput.value.trim()) {
            push(ref(db, 'messages'), { nick: user.nick, text: msgInput.value.trim(), avatar: user.avatar || "" });
            msgInput.value = ''; msgInput.style.height = 'auto';
        }
    }
    document.getElementById('send-btn').onclick = send;

    const saved = localStorage.getItem('chat_v21_nikita');
    if(saved) { user = JSON.parse(saved); startChat(); }
</script>
</body>
</html>
