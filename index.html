<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Real-Time Chat</title>
    <style>
        :root {
            --bg-color: #e5ddd5;
            --my-msg-bg: #dcf8c6;
            --other-msg-bg: #ffffff;
            --primary-color: #075e54;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #d1d1d1; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .auth-card { background: white; padding: 30px; border-radius: 15px; text-align: center; width: 300px; display: flex; flex-direction: column; gap: 15px; }
        #avatar-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: 0 auto; border: 2px solid var(--primary-color); }

        #chat-window { width: 500px; height: 90vh; background: var(--bg-color); display: none; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden;}
        #messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .message { display: flex; gap: 10px; max-width: 80%; }
        .message.mine { align-self: flex-end; flex-direction: row-reverse; }
        .message.others { align-self: flex-start; }
        
        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .msg-bubble { padding: 8px 12px; border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; }
        .mine .msg-bubble { background: var(--my-msg-bg); }
        .others .msg-bubble { background: var(--other-msg-bg); }
        
        .nickname { font-size: 11px; font-weight: bold; color: var(--primary-color); margin-bottom: 3px; display: block; }
        .msg-time { font-size: 10px; color: #888; text-align: right; margin-top: 4px; }

        #input-area { background: #f0f0f0; padding: 15px; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 25px; border: none; outline: none; }
        button { background: var(--primary-color); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        .hidden { display: none !important; }
        
        /* Эффект тряски */
        .shake { animation: shake-anim 0.3s ease-in-out; }
        @keyframes shake-anim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h3>Общий чат</h3>
        <img src="https://via.placeholder.com/80" id="avatar-preview">
        <input type="file" id="avatar-input" accept="image/*">
        <input type="text" id="reg-nick" placeholder="Введите ваш ник">
        <button id="reg-btn">Войти</button>
    </div>
</div>

<div id="chat-window">
    <div id="messages-container"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Написать сообщение..." autocomplete="off">
        <button id="send-btn">➤</button>
    </div>
</div>

<script type="module">
    // Импорт необходимых модулей Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    // Твой конфиг
    const firebaseConfig = {
        apiKey: "AIzaSyD2sN925y_wx5qn-E6hFRWp77YL56SC2j0",
        authDomain: "chat-community-63b8b.firebaseapp.com",
        databaseURL: "https://chat-community-63b8b-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "chat-community-63b8b",
        storageBucket: "chat-community-63b8b.firebasestorage.app",
        messagingSenderId: "247042160782",
        appId: "1:247042160782:web:0556c9ad0681db3649f1df"
    };

    // Инициализация
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messagesRef = ref(db, 'messages');

    const container = document.getElementById('messages-container');
    const input = document.getElementById('msg-input');
    const avatarInput = document.getElementById('avatar-input');
    const avatarPreview = document.getElementById('avatar-preview');
    
    let currentUser = JSON.parse(localStorage.getItem('chat_v4_user')) || { nick: '', avatar: '' };

    // Обработка аватара
    avatarInput.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            avatarPreview.src = ev.target.result;
            currentUser.avatar = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // Вход в чат
    document.getElementById('reg-btn').onclick = () => {
        const nick = document.getElementById('reg-nick').value.trim();
        if (!nick || !currentUser.avatar) return alert("Выберите фото и введите ник!");
        
        currentUser.nick = nick;
        localStorage.setItem('chat_v4_user', JSON.stringify(currentUser));
        startChat();
    };

    function startChat() {
        document.getElementById('auth-overlay').classList.add('hidden');
        document.getElementById('chat-window').style.display = 'flex';
        
        // Слушаем новые сообщения из Firebase
        onChildAdded(messagesRef, (snapshot) => {
            const data = snapshot.val();
            renderMessage(data);
        });
    }

    function renderMessage(data) {
        const isMine = data.nick === currentUser.nick;
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isMine ? 'mine' : 'others'} shake`;
        
        msgDiv.innerHTML = `
            <img src="${data.avatar}" class="msg-avatar">
            <div class="msg-bubble">
                <span class="nickname">${isMine ? 'Вы' : data.nick}</span>
                <div>${data.text}</div>
                <div class="msg-time">${data.time}</div>
            </div>
        `;
        
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
        const text = input.value.trim();
        if (text) {
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            // Отправка в облако
            push(messagesRef, {
                nick: currentUser.nick,
                avatar: currentUser.avatar,
                text: text,
                time: time
            });
            input.value = '';
        }
    }

    // Если уже залогинены — сразу в чат
    if (currentUser.nick) startChat();

    document.getElementById('send-btn').onclick = sendMessage;
    input.onkeypress = (e) => e.key === 'Enter' && sendMessage();

</script>

</body>
</html>
