<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nikita Global v44 - Fixed & Admin Power</title>
    <style>
        :root { 
            --bg-color: #e5ddd5; --accent: #075e54; --bubble-me: #dcf8c6; --bubble-other: #fff; 
            --text: #000; --header-bg: #ededed; --input-bg: #fff; --input-text: #000;
            --wallpaper: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        }

        /* ТЕМЫ */
        body.style-neon { --accent: #00ffcc; --bubble-me: #240046; --bubble-other: #10002b; --text: #00ffcc; --header-bg: #10002b; --input-bg: #1a1a2e; --input-text: #00ffcc; --wallpaper: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSQ1zndaIrDLWxJiEHGUbLg5OThTK3wtizYEr_WXK5xrg&s=10'); }
        body.style-horror { --accent: #660000; --bubble-me: #4d0000; --bubble-other: #1a1a1a; --text: #8b0000; --header-bg: #000; --input-bg: #000; --input-text: #ff4d4d; --wallpaper: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTZZXwlYK_mc3T4Los-gzwTbN8Sf6lKA8yTVHrGfV6G8g&s=10'); }
        body.style-cartoon { --accent: #ff6f69; --bubble-me: #ffcc5c; --bubble-other: #96ceb4; --text: #444; --header-bg: #ff6f69; --input-bg: #ffeead; --input-text: #444; --wallpaper: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRUCkRXfvmclaNxnXlw3-GYeDScgX5cnScLQeqcqSaUIA&s=10'); }

        body, html { font-family: 'Segoe UI', sans-serif; background: #111; margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #chat-window { width: 100%; max-width: 450px; background: var(--bg-color); display: none; flex-direction: column; height: 100%; margin: 0 auto; border-left: 1px solid #444; border-right: 1px solid #444; }
        header { background: var(--header-bg); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; color: var(--text); z-index: 10; }
        #messages-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-image: var(--wallpaper); background-size: cover; background-position: center; }
        #input-area { background: var(--header-bg); padding: 10px 15px; display: flex; gap: 8px; border-top: 1px solid #ddd; align-items: center; }
        #msg-input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ccc; outline: none; background: var(--input-bg); color: var(--input-text); }
        .message { display: flex; gap: 8px; max-width: 85%; animation: drop 0.2s; }
        .msg-bubble { padding: 8px 12px; border-radius: 15px; background: var(--bubble-other); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; }
        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        .mine { align-self: flex-end; flex-direction: row-reverse; }
        .mine .msg-bubble { background: var(--bubble-me); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 4000; padding: 20px; }
        .modal-card { background: white; border-radius: 25px; width: 100%; max-width: 320px; padding: 25px; text-align: center; color: #333; max-height: 80vh; overflow-y: auto; }
        .btn-style { width: 100%; padding: 12px; border: none; border-radius: 12px; font-weight: bold; margin-bottom: 8px; cursor: pointer; transition: 0.2s; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; background: #555; overflow: hidden; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        #p-desc { margin: 10px 0; padding: 10px; border-radius: 10px; background: #f8f9fa; font-size: 14px; border: 1px dashed #ccc; color: #555; }
        .hidden { display: none !important; }
        .admin-user-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; gap: 5px; }
    </style>
</head>
<body class="style-default">

<div id="auth-container" style="position:fixed; inset:0; background:#f0f2f5; display:flex; justify-content:center; align-items:center; z-index:5000;">
    <div style="background:white; padding:30px; border-radius:25px; width:280px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <h2 style="color:#075e54">Nikita Master</h2>
        <input type="text" id="login-nick" placeholder="Ник" style="width:100%; padding:10px; margin:5px 0; border-radius:10px; border:1px solid #ccc;">
        <input type="password" id="login-pass" placeholder="Пароль" style="width:100%; padding:10px; margin:5px 0; border-radius:10px; border:1px solid #ccc;">
        <button id="btn-enter" class="btn-style" style="background:#075e54; color:white; margin-top:10px;">ВОЙТИ</button>
    </div>
</div>

<div id="admin-modal" class="modal">
    <div class="modal-card">
        <h2 style="color:red; margin-top:0;">АДМИН ПАНЕЛЬ 🛠️</h2>
        <button class="btn-style" style="background:black; color:white;" onclick="clearAllMessages()">🔥 ОЧИСТИТЬ ВЕСЬ ЧАТ</button>
        <hr>
        <div id="admin-users-list"></div>
        <button onclick="closeModal('admin-modal')" class="btn-style" style="background:#eee; margin-top:10px;">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="profile-modal" class="modal">
    <div class="modal-card">
        <div id="p-ava-box" class="avatar" style="width:80px; height:80px; margin:0 auto 10px; font-size:30px;"></div>
        <input type="file" id="p-file" class="hidden" accept="image/*">
        <h3 id="p-nick" style="margin:5px 0;">...</h3>
        <div id="p-desc">О себе...</div>
        <p id="p-coins" style="color:orange; font-weight:bold; font-size:22px; margin:10px 0;">0 💰</p>
        <div id="p-owner-controls">
            <button class="btn-style" style="background:#34b7f1; color:white;" onclick="openSettings()">🎨 ИЗМЕНИТЬ СТИЛЬ</button>
        </div>
        <button onclick="closeModal('profile-modal')" class="btn-style" style="background:#eee;">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="settings-modal" class="modal">
    <div class="modal-card">
        <h3>Личный стиль</h3>
        <button class="btn-style" onclick="setStyle('default')">Классика</button>
        <button class="btn-style" style="background:#1a1a2e; color:#00ffcc;" onclick="setStyle('neon')">Неон</button>
        <button class="btn-style" style="background:#1a0000; color:#ff4d4d;" onclick="setStyle('horror')">Хоррор</button>
        <button class="btn-style" style="background:#ffeead;" onclick="setStyle('cartoon')">Мультяш</button>
    </div>
</div>

<div id="chat-window">
    <header>
        <div style="display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="openProfile(user.nick)">
            <div id="my-ava-header" class="avatar"></div>
            <strong><span id="my-name">...</span></strong>
        </div>
        <button id="admin-btn" class="hidden" style="background:red; color:white; border:none; border-radius:10px; padding:8px 12px; font-weight:bold;" onclick="openAdminPanel()">АДМИН</button>
    </header>
    <div id="messages-container"></div>
    <div id="input-area">
        <label style="cursor:pointer; font-size:20px; padding:5px;">🖼️<input type="file" id="chat-img-input" class="hidden" accept="image/*"></label>
        <input type="text" id="msg-input" placeholder="Сообщение или 'фарм'...">
        <button id="send-btn" style="background:var(--accent); color:white; border:none; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center;">➤</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, get, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD2sN925y_wx5qn-E6hFRWp77YL56SC2j0",
        authDomain: "chat-community-63b8b.firebaseapp.com",
        databaseURL: "https://chat-community-63b8b-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "chat-community-63b8b",
        storageBucket: "chat-community-63b8b.firebasedatabase.app",
        messagingSenderId: "247042160782",
        appId: "1:247042160782:web:0556c9ad0681db3649f1df"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let user = null;
    let allUsers = {};

    document.getElementById('btn-enter').onclick = async () => {
        const nick = document.getElementById('login-nick').value.trim();
        const pass = document.getElementById('login-pass').value.trim();
        if(!nick || !pass) return;
        const snap = await get(ref(db, 'users/' + nick));
        
        if (snap.exists()) {
            const data = snap.val();
            if (data.pass !== pass) return alert("Неверный пароль!");
            user = data;
        } else {
            user = { nick, pass, avatar: "", coins: 0, lastFarm: 0, theme: "default", desc: "Новичок в чате" };
        }
        
        if(nick === "Nikita" && pass === "nikitakit") user.isAdmin = true;
        await set(ref(db, 'users/' + nick), user);
        localStorage.setItem('chat_v44_session', JSON.stringify({nick: user.nick, pass: user.pass}));
        startChat();
    };

    function startChat() {
        document.getElementById('auth-container').classList.add('hidden');
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('my-name').textContent = user.nick;
        
        // Слушатель для профиля пользователя (для кика при удалении)
        onValue(ref(db, `users/${user.nick}`), (snap) => {
            if(!snap.exists()) {
                alert("Ваш аккаунт был удален администратором.");
                localStorage.removeItem('chat_v44_session');
                location.reload();
            } else {
                const updated = snap.val();
                user.coins = updated.coins || 0;
                user.lastFarm = updated.lastFarm || 0;
                user.theme = updated.theme || "default";
                document.body.className = 'style-' + user.theme;
                if(user.isAdmin) document.getElementById('admin-btn').classList.remove('hidden');
            }
        });

        // Загрузка всех юзеров для аватарок и админки
        onValue(ref(db, 'users'), (s) => {
            if(s.exists()){
                allUsers = s.val();
                const me = allUsers[user.nick];
                document.getElementById('my-ava-header').innerHTML = me.avatar ? `<img src="${me.avatar}">` : user.nick[0];
                if(document.getElementById('admin-modal').style.display === 'flex') updateAdminUsersList();
            }
        });
        
        // Починка сообщений: Используем onValue для полной синхронизации без багов
        onValue(ref(db, 'messages'), (snap) => {
            const container = document.getElementById('messages-container');
            container.innerHTML = "";
            if(snap.exists()){
                Object.values(snap.val()).forEach(m => renderMessage(m));
            }
            container.scrollTop = container.scrollHeight;
        });
    }

    // АДМИН ПАНЕЛЬ
    window.openAdminPanel = () => {
        updateAdminUsersList();
        document.getElementById('admin-modal').style.display = 'flex';
    };

    function updateAdminUsersList() {
        const list = document.getElementById('admin-users-list');
        list.innerHTML = "<h4>Управление игроками:</h4>";
        Object.keys(allUsers).forEach(uNick => {
            if(uNick === user.nick) return; // Себя удалять нельзя
            const u = allUsers[uNick];
            const row = document.createElement('div');
            row.className = 'admin-user-row';
            row.innerHTML = `
                <span style="flex:1; text-align:left;"><b>${uNick}</b> (${u.coins}💰)</span> 
                <button onclick="adminAddCoins('${uNick}')" style="background:#28a745; color:white; border:none; border-radius:5px; padding:5px;">+💰</button>
                <button onclick="adminDeleteUser('${uNick}')" style="background:#dc3545; color:white; border:none; border-radius:5px; padding:5px;">Удалить</button>
            `;
            list.appendChild(row);
        });
    }

    window.adminAddCoins = async (nick) => {
        const amt = prompt(`Сколько монет выдать для ${nick}?`, "100");
        if(amt && !isNaN(amt)) {
            const newTotal = (allUsers[nick].coins || 0) + parseInt(amt);
            await update(ref(db, `users/${nick}`), { coins: newTotal });
        }
    };

    window.adminDeleteUser = async (nick) => {
        if(confirm(`ВЫ УВЕРЕНЫ? Пользователь ${nick} будет немедленно изгнан!`)) {
            await remove(ref(db, `users/${nick}`));
            updateAdminUsersList();
        }
    };

    window.clearAllMessages = async () => {
        if(confirm("УДАЛИТЬ ВСЕ СООБЩЕНИЯ? Это очистит историю для всех!")) {
            await remove(ref(db, 'messages'));
            await push(ref(db, 'messages'), { nick: "SYSTEM", content: "Чат был полностью очищен Никитой.", type: "text" });
        }
    };

    // ФАРМ (ИСПРАВЛЕН)
    document.getElementById('send-btn').onclick = async () => {
        const val = document.getElementById('msg-input').value.trim();
        if(!val) return;
        
        if(val.toLowerCase() === 'фарм') {
            const now = Date.now();
            const last = user.lastFarm || 0;
            const wait = 1800000; // 30 минут

            if(now - last >= wait) {
                const newCoins = (user.coins || 0) + 20;
                await update(ref(db, `users/${user.nick}`), { coins: newCoins, lastFarm: now });
                await push(ref(db, 'messages'), { nick: "SYSTEM", content: `🎁 ${user.nick} получил 20 монет за фарм!`, type: "text" });
            } else {
                const left = Math.ceil((wait - (now - last)) / 60000);
                alert(`Подожди еще ${left} мин. до следующего фарма!`);
            }
        } else {
            await push(ref(db, 'messages'), { nick: user.nick, type: 'text', content: val });
        }
        document.getElementById('msg-input').value = "";
    };

    // РЕНДЕР
    function renderMessage(d) {
        const div = document.createElement('div');
        div.className = `message ${d.nick === user.nick ? 'mine' : ''}`;
        const u = allUsers[d.nick] || { avatar: "" };
        const body = d.type === 'image' ? `<img src="${d.content}" class="chat-img">` : d.content;
        div.innerHTML = `<div class="avatar" onclick="openProfile('${d.nick}')">${u.avatar ? `<img src="${u.avatar}">` : d.nick[0]}</div>
                         <div class="msg-bubble">${body}</div>`;
        document.getElementById('messages-container').appendChild(div);
    }

    // ПРОФИЛЬ И КАРТИНКИ
    window.openProfile = (nick) => {
        const target = allUsers[nick] || { nick, coins: 0, avatar: "", desc: "..." };
        document.getElementById('p-nick').textContent = target.nick;
        document.getElementById('p-coins').textContent = `${target.coins || 0} 💰`;
        document.getElementById('p-desc').textContent = target.desc || "Привет!";
        document.getElementById('p-ava-box').innerHTML = target.avatar ? `<img src="${target.avatar}">` : target.nick[0];
        
        const controls = document.getElementById('p-owner-controls');
        if(nick === user.nick) {
            controls.classList.remove('hidden');
            document.getElementById('p-ava-box').onclick = () => document.getElementById('p-file').click();
            document.getElementById('p-desc').onclick = async () => {
                const n = prompt("Изменить описание:", target.desc);
                if(n) await update(ref(db, `users/${user.nick}`), { desc: n });
            };
        } else {
            controls.classList.add('hidden');
            document.getElementById('p-ava-box').onclick = null;
            document.getElementById('p-desc').onclick = null;
        }
        document.getElementById('profile-modal').style.display = 'flex';
    };

    document.getElementById('chat-img-input').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => { await push(ref(db, 'messages'), { nick: user.nick, type: 'image', content: ev.target.result }); };
        reader.readAsDataURL(file);
    };

    document.getElementById('p-file').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async (ev) => await update(ref(db, `users/${user.nick}`), { avatar: ev.target.result });
        reader.readAsDataURL(file);
    };

    window.setStyle = async (s) => { 
        await update(ref(db, `users/${user.nick}`), { theme: s });
        closeModal('settings-modal'); 
    };

    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.openSettings = () => { closeModal('profile-modal'); document.getElementById('settings-modal').style.display = 'flex'; };

    // АВТОВХОД
    const session = localStorage.getItem('chat_v44_session');
    if(session) {
        const {nick, pass} = JSON.parse(session);
        get(ref(db, 'users/' + nick)).then(snap => {
            if(snap.exists() && snap.val().pass === pass) {
                user = snap.val();
                if(nick === "Nikita") user.isAdmin = true;
                startChat();
            }
        });
    }
</script>
</body>
</html>
